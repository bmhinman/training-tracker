<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Phase 1 · Training Log</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F2ED;
    --card: #FFFFFF;
    --ink: #1A1A18;
    --ink-soft: #6B6860;
    --ink-muted: #A8A49E;
    --accent: #2D5A8E;
    --accent-light: #EBF1F8;
    --green: #2D7A4F;
    --green-light: #EBF5F0;
    --amber: #B86E00;
    --amber-light: #FFF4E0;
    --red: #C0392B;
    --red-light: #FDECEA;
    --border: #E4E0D8;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--accent);
    color: white;
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(45,90,142,0.3);
  }
  .app-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: -0.3px;
    margin-bottom: 2px;
  }
  .app-header p {
    font-size: 13px;
    opacity: 0.75;
    font-weight: 300;
  }

  /* ── NAV TABS ── */
  .nav-tabs {
    display: flex;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 68px;
    z-index: 99;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: none;
    padding: 12px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── MAIN ── */
  .main { padding: 16px; max-width: 600px; margin: 0 auto; }

  /* ── TODAY CARD ── */
  .today-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .today-card-header {
    background: var(--accent);
    color: white;
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .today-card-header .date-label {
    font-size: 11px;
    opacity: 0.75;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 500;
  }
  .today-card-header .day-name {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    margin-top: 2px;
  }
  .workout-badge {
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    text-align: center;
  }
  .today-card-body { padding: 18px; }
  .workout-title {
    font-family: 'DM Serif Display', serif;
    font-size: 19px;
    margin-bottom: 6px;
    color: var(--ink);
  }
  .workout-desc {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.55;
    margin-bottom: 14px;
  }
  .workout-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .tag {
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .tag-hr { background: var(--accent-light); color: var(--accent); }
  .tag-type { background: var(--green-light); color: var(--green); }
  .tag-note { background: var(--amber-light); color: var(--amber); }

  /* ── LOG FORM ── */
  .log-section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--ink-muted);
    margin-bottom: 12px;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .form-row.single { grid-template-columns: 1fr; }
  .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 5px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
  }
  .field textarea { resize: none; height: 80px; font-size: 14px; line-height: 1.5; }

  /* RPE slider */
  .rpe-track {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .rpe-track input[type=range] {
    flex: 1;
    border: none;
    background: none;
    padding: 0;
    accent-color: var(--accent);
    height: 4px;
  }
  .rpe-val {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    min-width: 24px;
    text-align: right;
  }

  /* Zone time inputs */
  .zone-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }

  /* Save button */
  .save-btn {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    margin-top: 16px;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.2px;
  }
  .save-btn:active { transform: scale(0.98); background: #234a73; }

  .skip-btn {
    width: 100%;
    background: none;
    color: var(--ink-muted);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 13px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    margin-top: 8px;
  }

  /* ── SAVED INDICATOR ── */
  .saved-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--green-light);
    color: var(--green);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* ── WEEK VIEW ── */
  .week-section { margin-bottom: 20px; }
  .week-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--ink-muted);
    margin-bottom: 10px;
    padding-left: 2px;
  }
  .week-grid { display: flex; flex-direction: column; gap: 8px; }
  .day-row {
    background: var(--card);
    border-radius: 12px;
    padding: 13px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    cursor: pointer;
    transition: transform 0.1s;
    border: 1.5px solid transparent;
  }
  .day-row:active { transform: scale(0.99); }
  .day-row.is-today { border-color: var(--accent); }
  .day-row.is-logged { border-color: var(--green); }
  .day-row.is-skipped { opacity: 0.5; }
  .day-row.is-future { opacity: 0.7; }
  .day-dot {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .dot-rest { background: var(--border); color: var(--ink-muted); }
  .dot-ride { background: var(--accent-light); color: var(--accent); }
  .dot-strength { background: #EEF0FB; color: #3D5A9E; }
  .dot-yoga { background: #F5EEF8; color: #8E44AD; }
  .dot-logged { background: var(--green-light); color: var(--green); }
  .dot-skipped { background: var(--border); color: var(--ink-muted); }
  .day-info { flex: 1; min-width: 0; }
  .day-info .di-date { font-size: 11px; color: var(--ink-muted); margin-bottom: 2px; }
  .day-info .di-workout { font-size: 14px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .day-info .di-logged { font-size: 12px; color: var(--green); margin-top: 2px; }
  .day-chevron { color: var(--ink-muted); font-size: 16px; }

  /* ── STATS TAB ── */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
  }
  .stat-card .sc-val {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-card .sc-label {
    font-size: 12px;
    color: var(--ink-muted);
    font-weight: 500;
  }
  .progress-bar-wrap {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: var(--shadow);
    margin-bottom: 10px;
  }
  .pb-label { font-size: 13px; font-weight: 500; color: var(--ink-soft); margin-bottom: 10px; display: flex; justify-content: space-between; }
  .pb-track {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .pb-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.5s ease;
  }
  .pb-fill.green { background: var(--green); }

  /* ── DETAIL VIEW ── */
  .detail-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    display: none;
    align-items: flex-end;
  }
  .detail-overlay.open { display: flex; }
  .detail-sheet {
    background: var(--card);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 20px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .detail-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 18px;
  }
  .detail-close {
    position: absolute;
    top: 16px;
    right: 20px;
    background: var(--bg);
    border: none;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: white;
    padding: 12px 20px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  /* Vancouver notice */
  .notice-card {
    background: var(--amber-light);
    border: 1.5px solid #F0C070;
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--amber);
    line-height: 1.5;
  }
  .notice-card strong { display: block; margin-bottom: 3px; font-size: 14px; }
</style>
</head>

const API_URL = 'https://script.google.com/macros/s/AKfycbzCrhXhlQnGnWJZ_QHCAPLYoSW-4h-3fVamS-XOZzOMITOzjqhRhosvLTZF8D0Io9o4CQ/exec';

const STORAGE_KEY = 'phase1_log_v1';
let log = {};

// Load from localStorage immediately (instant), then sync from Sheets
function initLog() {
  try { log = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { log = {}; }
  renderToday();
  fetchFromSheets();
}

async function fetchFromSheets() {
  if (API_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    console.log('API_URL not set — skipping fetch');
    return;
  }
  console.log('Fetching from Sheets…', API_URL);
  try {
    const res = await fetch(API_URL + '?action=getAll');
    console.log('Response status:', res.status);
    const text = await res.text();
    console.log('Raw response:', text);
    const data = JSON.parse(text);
    if (data && data.log) {
      log = data.log;
      console.log('Log loaded from Sheets:', log);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(log));
      renderToday();
      const activeTab = document.querySelector('.tab-btn.active')?.textContent?.toLowerCase();
      if (activeTab === 'schedule') renderSchedule();
      if (activeTab === 'stats') renderStats();
    } else {
      console.log('No log data in response:', data);
    }
  } catch(e) {
    console.log('Fetch error:', e.message, e);
  }
}

async function saveLog(logData) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(logData));
  if (API_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;
  try {
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveAll', log: logData })
    });
  } catch(e) {
    console.log('Sheets save failed, data saved locally');
  }
}

async function deleteEntry(dateStr) {
  delete log[dateStr];
  localStorage.setItem(STORAGE_KEY, JSON.stringify(log));
  if (API_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;
  try {
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'delete', date: dateStr })
    });
  } catch(e) {}
}

// ── HELPERS ───────────────────────────────────────────────────────────

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDate(str) {
  const [y,m,d] = str.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

function typeIcon(type) {
  if (!type) return '·';
  const t = type.toLowerCase();
  if (t.includes('ride') || t.includes('cardio')) return '🚴';
  if (t.includes('strength')) return '💪';
  if (t.includes('yoga')) return '🧘';
  if (t.includes('rest') || t.includes('travel')) return '😴';
  if (t.includes('light') || t.includes('flex')) return '🚶';
  return '·';
}

function dotClass(entry, dateStr, isLogged, isSkipped) {
  if (isLogged) return 'dot-logged';
  if (isSkipped) return 'dot-skipped';
  const t = (entry.type||'').toLowerCase();
  if (t.includes('ride') || t.includes('cardio')) return 'dot-ride';
  if (t.includes('strength')) return 'dot-strength';
  if (t.includes('yoga')) return 'dot-yoga';
  return 'dot-rest';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function isFuture(dateStr) {
  return dateStr > todayStr();
}

async function saveEntry(dateStr, isRide, isStrength) {
  const entry = {
    status: 'logged',
    recovery: document.getElementById('f-recovery')?.value || '',
    duration: document.getElementById('f-duration')?.value || '',
    rpe: document.getElementById('f-rpe')?.value || '',
    notes: document.getElementById('f-notes')?.value || '',
  };
  if (isRide) {
    entry.avgHr = document.getElementById('f-avghr')?.value || '';
    entry.maxHr = document.getElementById('f-maxhr')?.value || '';
    entry.z2 = document.getElementById('f-z2')?.value || '';
    entry.z3 = document.getElementById('f-z3')?.value || '';
    entry.z4 = document.getElementById('f-z4')?.value || '';
    entry.cals = document.getElementById('f-cals')?.value || '';
  }
  log[dateStr] = entry;
  showToast('Saving… 💪');
  await saveLog(log);
  showToast('Workout saved! 💪');
  renderToday();
}

async function skipEntry(dateStr) {
  log[dateStr] = { status: 'skipped' };
  await saveLog(log);
  showToast('Marked as skipped');
  renderToday();
}

async function markRest(dateStr) {
  log[dateStr] = { status: 'logged', notes: 'Rest day' };
  await saveLog(log);
  showToast('Rest day logged ✓');
  renderToday();
}

async function clearLog(dateStr) {
  await deleteEntry(dateStr);
  renderToday();
}

// ── SCHEDULE TAB ──────────────────────────────────────────────────────

function renderSchedule() {
  const wrap = document.getElementById('scheduleWrap');
  const today = todayStr();

  // Group by week property
  const weekMap = {};
  PHASE1.forEach(entry => {
    const key = entry.week === 'pre' ? '__pre' : `week_${entry.week}`;
    if (!weekMap[key]) weekMap[key] = { week: entry.week, days: [] };
    weekMap[key].days.push(entry);
  });

  const weeks = Object.values(weekMap).map(w => {
    let label;
    if (w.week === 'pre') label = 'Pre-Week (Apr 4–5)';
    else {
      const hasVancouver = w.days.some(d => d.notice === 'vancouver');
      const hasDeload = w.days.some(d => d.notice === 'deload');
      if (hasVancouver && w.week === 4) label = `Week ${w.week} · Pre-Vancouver + Travel`;
      else if (hasVancouver) label = `Week ${w.week} · 🎵 Vancouver — Leonids Tour`;
      else if (hasDeload) label = `Week ${w.week} · ↩️ Post-Tour Deload`;
      else label = `Week ${w.week}`;
    }
    return { label, days: w.days };
  });

  wrap.innerHTML = weeks.map(week => `
    <div class="week-section">
      <div class="week-label">${week.label}</div>
      <div class="week-grid">
        ${week.days.map(entry => {
          const logged = log[entry.date];
          const isLogged = logged?.status === 'logged';
          const isSkipped = logged?.status === 'skipped';
          const isToday = entry.date === today;
          const future = isFuture(entry.date);
          const dc = dotClass(entry, entry.date, isLogged, isSkipped);
          const icon = typeIcon(entry.type);
          let rowClass = 'day-row';
          if (isToday) rowClass += ' is-today';
          else if (isLogged) rowClass += ' is-logged';
          else if (isSkipped) rowClass += ' is-skipped';
          else if (future) rowClass += ' is-future';

          const logSummary = isLogged && logged.avgHr
            ? `Avg HR ${logged.avgHr} · RPE ${logged.rpe}`
            : isLogged ? 'Logged ✓' : isSkipped ? 'Skipped' : '';

          return `<div class="${rowClass}" onclick="openDetail('${entry.date}')">
            <div class="day-dot ${dc}">${isLogged ? '✓' : isSkipped ? '–' : icon}</div>
            <div class="day-info">
              <div class="di-date">${entry.day}, ${fmtDate(entry.date)}${isToday ? ' · Today' : ''}</div>
              <div class="di-workout">${entry.label}</div>
              ${logSummary ? `<div class="di-logged">${logSummary}</div>` : ''}
            </div>
            <div class="day-chevron">›</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

      <div class="today-card-body">
        <div class="log-section-title">Ride Averages</div>
        <div style="font-family:'DM Serif Display',serif;font-size:36px;color:var(--accent)">${avgHrAll} <span style="font-size:18px;color:var(--ink-muted)">bpm avg</span></div>
        <p style="font-size:13px;color:var(--ink-muted);margin-top:4px">Average HR across ${rideData.length} logged ride${rideData.length!==1?'s':''}</p>
      </div>
    </div>` : `
    <div class="today-card" style="margin-top:10px">
      <div class="today-card-body" style="text-align:center;padding:24px">
        <p style="font-size:14px;color:var(--ink-muted)">Log some rides to see your HR trends here.</p>
      </div>
    </div>`}

    ${skipped > 0 ? `<p style="font-size:12px;color:var(--ink-muted);text-align:center;margin-top:12px">${skipped} session${skipped!==1?'s':''} skipped — that's okay.</p>` : ''}
  `;
}

// ── INIT ──────────────────────────────────────────────────────────────

initLog();
</script>
</body>
</html>
